<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calafquén</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:'Oswald',Arial,sans-serif;
    min-height:100vh;
}

.player{
    width:100%;
    max-width:520px;
    margin:auto;
    padding:35px 25px;
    text-align:center;
}

.logo{
    font-size:42px;
    letter-spacing:2px;
    font-weight:700;
    border-bottom:1px solid #333;
    padding-bottom:25px;
 q  text-align:center;
}

.live{
    margin-top:25px;
    color:#ff3b30;
    font-size:15px;
    letter-spacing:3px;
}

.cover{
    margin-top:35px;
    width:100%;
    aspect-ratio:1/1;
    background:#181818;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    margin-top:25px;
}

.artist{
    font-size:30px;
    font-weight:600;
}

.song{
    color:#aaa;
    font-size:22px;
    margin-top:8px;
}

.controls{
    margin-top:35px;
}

button{
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid white;
    background:black;
    color:white;
    font-size:25px;
    cursor:pointer;
}

.bar{
    margin-top:30px;
    height:4px;
    background:#333;
}

.bar span{
    display:block;
    width:35%;
    height:100%;
    background:white;
}

.volume{
    margin-top:25px;
}

input[type=range]{
    width:100%;
}

.sections{
    margin-top:45px;
    border-top:1px solid #333;
}

.section{
    padding:22px 0;
    border-bottom:1px solid #333;
    font-size:24px;
    letter-spacing:1px;
}

.footer{
    margin-top:40px;
    color:#777;
    font-size:18px;
}
</style>

</head>


<body>

<div class="player">

<div class="logo">
Calafquén 
</div>


<div class="live">
● Sonidos y Paisajes desde el Sur
</div>


<div class="cover">

<img id="cover"
src="https://via.placeholder.com/600x600/111111/ffffff?text=LATITUD+39">

</div>


<div class="info">

<div class="artist" id="artist">
Calafquén
</div>

<div class="song" id="song">
Radio Online
</div>

</div>


<div class="controls">

<button onclick="playRadio()" id="btn">
▶
</button>


<div class="bar">
<span></span>
</div>


<div class="volume">

<input 
type="range"
min="0"
max="1"
step="0.01"
value="0.8"
oninput="changeVolume(this.value)"
>

</div>

</div>



<div class="sections">

<div class="section">
INSTAGRAM 
</div>

<div class="section">
PLAYLIST
</div>

<div class="section">
CONTACTO
</div>

<div class="footer">
 <p style="text-align: center;">
LICANRAY - Chile
</p>
 
</div>


</div>



<audio id="radio"
src="https://stream.zeno.fm/qt8bhhhy9xotv">
</audio>



<script>

const radio=document.getElementById("radio");
const btn=document.getElementById("btn");


function playRadio(){

if(radio.paused){

radio.play();

btn.innerHTML="Ⅱ";

}else{

radio.pause();

btn.innerHTML="▶";

}

}


function changeVolume(v){

radio.volume=v;

}


// Aquí luego conectamos Zeno Metadata API
// para artista, canción y portada

</script>


</body>
</html>
