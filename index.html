<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bitácora Sur Radio</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,#20332b,#000 60%);

font-family:Arial,Helvetica,sans-serif;
color:white;

}


.card{

width:340px;
max-width:90%;
text-align:center;

}


.cover{

width:100%;
aspect-ratio:1;

border-radius:20px;
overflow:hidden;

box-shadow:
0 20px 50px rgba(0,0,0,.6);

background:#111;

}


.cover img{

width:100%;
height:100%;
object-fit:cover;

}



.artist{

margin-top:22px;

font-size:22px;
font-weight:600;

letter-spacing:1px;

}



.song{

margin-top:6px;

font-size:15px;

opacity:.7;

}



.live{

margin-top:22px;

font-size:13px;

letter-spacing:3px;

color:#55ff77;

animation:pulse 1.8s infinite;

}



@keyframes pulse{

0%{
opacity:1;
}

50%{
opacity:.4;
}

100%{
opacity:1;
}

}



button{

margin-top:28px;

width:100%;

padding:16px;

border:none;

border-radius:50px;

background:white;

color:#000;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.03);

}



.footer{

margin-top:35px;

font-size:13px;

line-height:1.6;

opacity:.6;

}



</style>

</head>


<body>


<div class="card">


<div class="cover">

<!-- Cambia portada.jpg por tu imagen -->

<img src="portada.jpg" alt="Bitácora Sur">

</div>



<div class="artist">

Bitácora Sur

</div>


<div class="song">

Radio Online

</div>


<div class="live">

● EN VIVO

</div>



<audio id="radio">

<source src="https://stream.zeno.fm/qt8bhhhy9xotv" type="audio/mpeg">

</audio>



<button id="btn" onclick="playRadio()">

▶ Escuchar

</button>



<div class="footer">

Sonidos y Paisajes desde el Sur<br>

Licanray · Chile

</div>



</div>



<script>


let radio=document.getElementById("radio");

let btn=document.getElementById("btn");


function playRadio(){


if(radio.paused){

radio.play();

btn.innerHTML="⏸ Pausar";


}

else{

radio.pause();

btn.innerHTML="▶ Escuchar";


}


}


</script>


</body>

</html>
