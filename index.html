<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bitácora Sur Radio</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
}

body{
margin:0;
background:#000;
color:#fff;
font-family:'Barlow Condensed', sans-serif;
}

.container{
max-width:430px;
margin:auto;
padding:35px 28px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:70px;
}

.logo{
border:1px solid white;
padding:8px 10px;
font-size:22px;
font-weight:700;
font-style:italic;
}

.menu{
font-size:35px;
letter-spacing:-5px;
}

/* TITULO */

.section{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
letter-spacing:1px;
border-bottom:1px solid #555;
padding-bottom:18px;
}

.expand{
font-size:18px;
}

/* LIVE INFO */

.livebar{
display:flex;
align-items:center;
justify-content:space-between;
margin-top:35px;
}

.number{
background:white;
color:black;
font-size:35px;
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.info{
flex:1;
margin-left:18px;
}

.artist{
font-size:26px;
font-weight:bold;
}

.show{
font-size:22px;
}

.controls{
display:flex;
gap:15px;
}

.live{
border:1px solid #777;
padding:10px;
font-size:18px;
}

.play{
background:white;
color:black;
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
}

/* COVER */

.cover{
margin-top:45px;
position:relative;
}

.cover img{
width:100%;
display:block;
aspect-ratio:1/1;
object-fit:cover;
}

.live-tag{
position:absolute;
bottom:20px;
left:20px;
background:#000;
padding:10px 15px;
font-size:18px;
}

/* VOLUMEN */

.volume{
display:flex;
align-items:center;
gap:20px;
margin-top:35px;
}

.line{
height:4px;
background:white;
flex:1;
}

/* MENU */

.tabs{
margin-top:55px;
display:flex;
gap:45px;
font-size:22px;
border-bottom:1px solid #555;
padding-bottom:25px;
}

/* FOOTER */

.footer{
margin-top:90px;
border-top:1px solid #555;
border-bottom:1px solid #555;
padding:25px 0;
display:flex;
justify-content:space-between;
font-size:20px;
letter-spacing:1px;
}

.small{
font-size:16px;
}

</style>

</head>


<body>

<div class="container">


<div class="header">

<div class="logo">
BS
</div>

<div class="menu">
☰
</div>

</div>



<div class="section">

<div>
EN VIVO AHORA
</div>

<div class="expand">
EXPAND ˅
</div>

</div>



<div class="livebar">

<div class="number">
1
</div>


<div class="info">

<div class="artist">
LATITUD 39°
</div>

<div class="show">
BITÁCORA SUR
</div>

</div>


<div class="controls">

<div class="live">
LIVE
</div>

<div class="play">
▶
</div>

</div>


</div>



<div class="cover">

<img src="portada.jpg">

<div class="live-tag">
● LIVE
</div>

</div>



<div class="volume">

<div>
🔊
</div>

<div class="line"></div>

<div>
HD
</div>

<div>
□
</div>

</div>




<div class="tabs">

<div>
LATEST
</div>

<div>
MIXES
</div>

<div>
SHOWS
</div>

</div>




<div class="footer">

<div>
<b>BITÁCORA SUR</b><br>
<span class="small">LICANRAY ˅</span>
</div>


<div>
CONNECTED ˅
</div>


</div>


</div>

</body>
</html>
